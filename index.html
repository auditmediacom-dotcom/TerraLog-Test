<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TerraLog - AMC</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { background: white; border-radius: 10px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); padding: 40px; max-width: 700px; width: 100%; max-height: 90vh; overflow-y: auto; }
        h1 { color: #333; text-align: center; margin-bottom: 30px; font-size: 24px; }
        h2 { color: #667eea; font-size: 18px; margin-top: 20px; margin-bottom: 15px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; color: #333; font-weight: 500; font-size: 13px; }
        input, select, textarea { width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 5px; font-size: 13px; font-family: Arial; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #667eea; }
        input[readonly] { background-color: #f0f0f0; cursor: not-allowed; }
        button { background: #667eea; color: white; padding: 10px 20px; border: none; border-radius: 5px; font-size: 14px; font-weight: 600; cursor: pointer; width: 100%; margin-bottom: 8px; }
        button:hover { background: #5568d3; }
        button.secondary { background: #764ba2; }
        button.secondary:hover { background: #6a3f94; }
        button.email { background: #2ecc71; }
        button.email:hover { background: #27ae60; }
        button.share { background: #3498db; }
        button.share:hover { background: #2980b9; }
        button.admin { background: #e74c3c; }
        button.admin:hover { background: #c0392b; }
        .hidden { display: none !important; }
        .address-item { background: #f5f5f5; padding: 12px; border-radius: 5px; margin-bottom: 8px; border-left: 4px solid #667eea; font-size: 13px; }
        .mission-item { background: #f0f7ff; padding: 12px; border-radius: 5px; margin-bottom: 8px; border-left: 4px solid #667eea; display: flex; justify-content: space-between; align-items: center; }
        .mission-item button { width: auto; padding: 5px 10px; font-size: 12px; margin: 0; }
        .photo-preview { max-width: 150px; max-height: 150px; margin-top: 10px; border-radius: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 12px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #667eea; color: white; }
        .checkbox-group { display: flex; align-items: center; gap: 10px; }
        .checkbox-group input[type="checkbox"] { width: auto; }
        .button-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .button-group-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Page Accueil Enquêteur -->
        <div id="authPage">
            <img src="logo-amc.jpg" alt="AMC Logo" style="max-width: 200px; height: auto; margin: 0 auto 20px; display: block;">
            <h1>📱 TerraLog</h1>
            <div class="form-group">
                <label>Code Mission :</label>
                <input type="text" id="codeInput" placeholder="Ex: 1234">
            </div>
            <button type="button" onclick="authenticateMission()">Accéder à ma mission</button>
            <button type="button" class="admin" onclick="goToAdmin()">⚙️ Admin</button>
        </div>

        <!-- Page Login Admin -->
        <div id="loginPage" class="hidden">
            <h1>🔐 TerraLog - Admin</h1>
            <div class="form-group">
                <label>Mot de passe :</label>
                <input type="password" id="passwordInput" placeholder="Entrez le mot de passe">
            </div>
            <button type="button" onclick="checkPassword()">Connexion</button>
            <button type="button" class="secondary" onclick="goBackToAuth()">🔙 Retour</button>
        </div>

        <!-- Page Admin Panel -->
        <div id="adminPage" class="hidden">
            <h1>⚙️ Administration</h1>
            
            <h2>📤 Importer un fichier Excel</h2>
            <div class="form-group">
                <label>Sélectionne un fichier Bornage :</label>
                <input type="file" id="excelFile" accept=".xlsx,.xls">
            </div>
            <button type="button" onclick="importExcel()">📥 Importer</button>
            
            <h2>📋 Missions disponibles</h2>
            <div id="missionsList"></div>
            
            <button type="button" class="admin" onclick="logout()">🔓 Déconnexion</button>
        </div>

        <!-- Page Configuration -->
        <div id="missionPage" class="hidden">
            <h1>Configuration Mission</h1>
            <div class="form-group">
                <label>Nom :</label>
                <input type="text" id="nomInput" readonly>
            </div>
            <div class="form-group">
                <label>Prénom :</label>
                <input type="text" id="prenomInput" readonly>
            </div>
            <div class="form-group">
                <label>Client :</label>
                <input type="text" id="clientInput" readonly>
            </div>
            <div class="form-group">
                <label>Magasin :</label>
                <input type="text" id="magasinInput" readonly>
            </div>
            <div class="form-group">
                <label>Semaine :</label>
                <input type="number" id="semaineInput">
            </div>
            <button type="button" onclick="startMission()">Commencer la mission</button>
            <button type="button" class="secondary" onclick="backToAuth()">🔙 Retour</button>
        </div>

        <!-- Page Saisie Terrain -->
        <div id="saisiePageParent" class="hidden">
            <div id="saisiePageContent"></div>
        </div>

        <!-- Page Fin de journée -->
        <div id="endPage" class="hidden">
            <h1>Fin de journée</h1>
            <div id="reportContent"></div>
            <div class="button-group-3">
                <button type="button" onclick="downloadReport()">💾 Télécharger</button>
                <button type="button" class="share" onclick="shareReport()">📤 Partager</button>
                <button type="button" class="email" onclick="sendByEmail()">📧 Email</button>
            </div>
            <div style="background: #f8f9fa; padding: 15px; border-radius: 5px; margin-top: 15px; text-align: center;">
                <p style="color: #666; margin: 0 0 15px 0;">✅ Si c'est ok pour vous, vous pouvez réinitialiser les adresses saisies</p>
                <button type="button" class="primary" onclick="resetMission()" style="width: 100%;">🔄 Réinitialiser</button>
            </div>
        </div>
    </div>

        let localMissions = {};

        const GOOGLE_SHEET_WEBHOOK = "https://script.google.com/macros/s/AKfycbyp7sOOt8cAp37koAw63vpRqn5B-B9jTYCoNtBUdNZFkW1xBg-sdHlBgXjebEWERrPI/exec";

        // Envoyer l'adresse au Google Sheet
        function sendToGoogleSheet(addr) {
            const payload = {
                client: missionInfo.client,
                magasin: missionInfo.magasin,
                numero: addr.suffixe ? `${addr.numero} ${addr.suffixe}` : addr.numero,
                rue: addr.rue,
                commune: addr.commune,
                foyers: addr.foyers,
                resultat: addr.resultat,
                typemalservi: addr.typemalservi,
                civilite: addr.civilite,
                nomPersonne: addr.nomPersonne,
                pasCommunication: addr.pasCommunication
            };
            
            fetch(GOOGLE_SHEET_WEBHOOK, {
                method: 'POST',
                body: JSON.stringify(payload)
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    addressesSentCount = data.totalRows;
                    updateSentCounter();
                }
            })
            .catch(error => console.log('Envoi échoué (hors ligne ok):', error));
        }
        function updateSentCounter() {
            const counter = document.getElementById('sentCounter');
            if (counter) {
                counter.textContent = addressesSentCount;
            }
        }

        function saveAddressesToStorage() {

        // Charger les adresses depuis localStorage
        function loadAddressesFromStorage() {
            const key = `mission_${currentMissionCode}_addresses`;
            const saved = localStorage.getItem(key);
            if (saved) {
                try {
                    currentAddresses = JSON.parse(saved);

                } catch (e) {

            return false;

        function deleteMission(code) {

                if (localMissions[code]) {
                    delete localMissions[code];
                    localStorage.setItem('localMissions', JSON.stringify(localMissions));
                }
                delete missionsData[code];
                displayMissions();
            }
        }

        function importExcel() {
            const file = document.getElementById('excelFile').files[0];
            if (!file) {
                alert('❌ Sélectionne un fichier');
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, {type: 'array'});
                    const sheetName = workbook.SheetNames[0];
                    const sheet = workbook.Sheets[sheetName];
                    const rows = XLSX.utils.sheet_to_json(sheet, {header: 1});

                    const code = prompt('Code mission (ex: 9999):');
                    if (!code) return;

                    const prenom = prompt('Prénom enquêteur:');
                    if (!prenom) return;

                    const nom = prompt('Nom enquêteur:');
                    if (!nom) return;

                    const client = prompt('Client:');
                    if (!client) return;

                    const magasin = prompt('Magasin:');
                    if (!magasin) return;

                    const semaine = prompt('Semaine:');
                    if (!semaine) return;

                    const communes = new Set();
                    const rues_par_commune = {};

                    for (let i = 1; i < rows.length; i++) {
                        const row = rows[i];
                        if (!row[2]) continue;
                        
                        const commune = row[2].toString().toUpperCase().trim();
                        const rue = row[3] ? row[3].toString().toUpperCase().trim() : '';

                        if (commune && rue) {
                            communes.add(commune);
                            if (!rues_par_commune[commune]) {
                                rues_par_commune[commune] = [];
                            }
                            if (!rues_par_commune[commune].includes(rue)) {
                                rues_par_commune[commune].push(rue);
                            }
                        }
                    }

                    const newMission = {
                        prenom,
                        nom,
                        client,
                        magasin,
                        semaine,
                        communes: Array.from(communes).sort(),
                        rues_par_commune: rues_par_commune
                    };

                    localMissions[code] = newMission;
                    localStorage.setItem('localMissions', JSON.stringify(localMissions));
                    
                    missionsData[code] = newMission;
                    
                    displayMissions();
                    document.getElementById('excelFile').value = '';
                    alert(`✅ Mission ${code} importée avec ${communes.size} commune(s)`);

                } catch (error) {
                    alert(`❌ Erreur lors de la lecture du fichier: ${error.message}`);
                }
            };
            reader.readAsArrayBuffer(file);
        }

        function authenticateMission() {
            const code = document.getElementById('codeInput').value.trim();
            if (!missionsData[code]) {
                alert('❌ Code mission invalide');

            currentMissionCode = code;
            const mission = missionsData[code];
            document.getElementById('nomInput').value = mission.nom;
            document.getElementById('prenomInput').value = mission.prenom;
            document.getElementById('clientInput').value = mission.client;
            document.getElementById('magasinInput').value = mission.magasin;
            document.getElementById('semaineInput').value = mission.semaine;
            document.getElementById('codeInput').value = '';
            
            showPage('missionPage');
        }

        function startMission() {
            const semaine = document.getElementById('semaineInput').value;
            missionInfo = {
                code: currentMissionCode,
                nom: document.getElementById('nomInput').value,
                prenom: document.getElementById('prenomInput').value,
                client: document.getElementById('clientInput').value,
                magasin: document.getElementById('magasinInput').value,
                semaine: semaine
            };
            
            addressesSentCount = 0;
            
            const mission = missionsData[currentMissionCode];
            let saisieHTML = `<h1>Saisie Terrain</h1>
                <div style="background: #fff3cd; padding: 10px; border-radius: 5px; margin-bottom: 15px; font-size: 12px;">
                    <strong>💾 Auto-sauvegarde activée</strong> - Vos adresses sont sauvegardées automatiquement
                </div>
                <div style="background: #d4edda; padding: 10px; border-radius: 5px; margin-bottom: 15px; font-size: 12px; display: flex; justify-content: space-between; align-items: center;">
                    <strong>📤 Envoi au serveur</strong>
                    <span style="background: #28a745; color: white; padding: 5px 10px; border-radius: 3px; font-size: 14px; font-weight: bold;">Adresses envoyées: <span id="sentCounter">0</span></span>
                </div>`;
            
            saisieHTML += `<h2>Localisation</h2>
                <div class="form-group">
                    <label>Commune :</label>
                    <select id="communeSelect" onchange="updateStreets()">
                        <option value="">-- Sélectionner --</option>
                        ${mission.communes.map(c => `<option value="${c}">${c}</option>`).join('')}
                        <option value="AUTRE">➕ Autre commune (saisie libre)</option>
                    </select>
                </div>
                <div id="communeLibreSection" class="hidden">
                    <div class="form-group">
                        <label>Commune (saisie libre) :</label>
                        <input type="text" id="communeLibreInput" placeholder="Tapez la commune">
                    </div>
                </div>
                <div class="form-group">
                    <label>Rue :</label>
                    <input type="text" id="rueSearch" placeholder="Tapez les premières lettres..." onkeyup="filterRues()" style="margin-bottom: 8px;">
                    <div id="rueSelectSection">
                        <select id="rueSelect">
                            <option value="">-- Sélectionner --</option>
                        </select>
                    </div>
                    <div id="rueLibreSection" class="hidden">
                        <input type="text" id="rueLibreInput" placeholder="Tapez la rue">
                    </div>
                </div>
                <div class="form-group">
                    <label>Numéro :</label>
                    <input type="number" id="numeroInput">
                </div>
                <div class="form-group">
                    <label>Suffixe (optionnel) :</label>
                    <input type="text" id="sufixeInput" placeholder="Bis, Ter, A, B...">
                </div>
                
                <h2>Informations Adresse</h2>
                <div class="form-group">
                    <label>Habitat :</label>
                    <select id="habitatSelect">
                        <option value="">-- Sélectionner --</option>
                        <option value="Collectif">Collectif</option>
                        <option value="Individuel">Individuel</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Nombre de foyers :</label>
                    <input type="number" id="foyersInput">
                </div>
                <div class="form-group">
                    <label>Accès :</label>
                    <select id="accesSelect">
                        <option value="">-- Sélectionner --</option>
                        <option value="Libre">Libre</option>
                        <option value="Vigik">Vigik</option>
                        <option value="Interphone">Interphone</option>
                        <option value="Code">Code</option>
                        <option value="Non servi">Non servi</option>
                    </select>
                </div>
                
                <h2>Résultat</h2>
                <div class="form-group">
                    <label>Résultat :</label>
                    <select id="resultatSelect" onchange="toggleMalServi()">
                        <option value="">-- Sélectionner --</option>
                        <option value="Bien servi">✅ Bien servi</option>
                        <option value="Non servi">❌ Non servi</option>
                        <option value="Mal servi">⚠️ Mal servi</option>
                    </select>
                </div>
                <div class="form-group">
                    <div class="checkbox-group">
                        <input type="checkbox" id="vuCheck">
                        <label style="margin:0;">Vu</label>
                    </div>
                </div>
                
                <div id="malServiSection" class="hidden">
                    <div class="form-group">
                        <label>Type de mal servi :</label>
                        <select id="typemalservSelect">
                            <option value="">-- Sélectionner --</option>
                            <option value="Stop Pubs">Stop Pubs</option>
                            <option value="Dépôt">Dépôt</option>
                            <option value="Multi distribution">Multi distribution</option>
                            <option value="Dépassement excessif">Dépassement excessif</option>
                            <option value="Encartage">Encartage</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Photo (optionnel) :</label>
                        <input type="file" id="photoInput" accept="image/*" onchange="previewPhoto()">
                        <img id="photoPreview" class="photo-preview" style="display:none;">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Observations (optionnel) :</label>
                    <textarea id="observationsInput" rows="3" placeholder="Notes supplémentaires..."></textarea>
                </div>
                
                <h2>Contact</h2>
                <div class="form-group">
                    <label>Civilité :</label>
                    <select id="civiliteSelect">
                        <option value="">-- Sélectionner --</option>
                        <option value="M.">M.</option>
                        <option value="Mme">Mme</option>
                        <option value="Mlle">Mlle</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Nom (optionnel) :</label>
                    <input type="text" id="nomPersonneInput" placeholder="Nom">
                </div>
                <div class="form-group">
                    <div class="checkbox-group">
                        <input type="checkbox" id="pasCommunicationCheck">
                        <label style="margin:0;">Pas de communication</label>
                    </div>
                </div>
                
                <button type="button" onclick="addAddress()">➕ Ajouter l'adresse</button>
                <button type="button" class="secondary" onclick="finishMission()">✅ Fin de journée</button>`;
            
            document.getElementById('saisiePageContent').innerHTML = saisieHTML;
            
            // Charger les adresses sauvegardées
            if (loadAddressesFromStorage()) {
                updateAddressList();
            }
            
            showPage('saisiePageParent');
        }

        function toggleMalServi() {
            const resultat = document.getElementById('resultatSelect').value;
            const section = document.getElementById('malServiSection');
            if (resultat === 'Mal servi') {
                section.classList.remove('hidden');
            } else {
                section.classList.add('hidden');
            }
        }

        function previewPhoto() {
            const input = document.getElementById('photoInput');
            const preview = document.getElementById('photoPreview');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function updateStreets() {
            const commune = document.getElementById('communeSelect').value;
            const mission = missionsData[currentMissionCode];
            
            // Réinitialiser le champ de recherche
            if (document.getElementById('rueSearch')) {
                document.getElementById('rueSearch').value = '';
            }
            
            if (commune === 'AUTRE') {
                // Saisie libre commune
                document.getElementById('communeLibreSection').classList.remove('hidden');
                document.getElementById('rueSelectSection').classList.add('hidden');
                document.getElementById('rueLibreSection').classList.remove('hidden');
            } else if (commune) {
                // Commune trouvée
                document.getElementById('communeLibreSection').classList.add('hidden');
                document.getElementById('rueSelectSection').classList.remove('hidden');
                document.getElementById('rueLibreSection').classList.add('hidden');
                
                const rues = mission.rues_par_commune[commune] || [];
                document.getElementById('rueSelect').innerHTML = '<option value="">-- Sélectionner --</option>' + 
                    rues.map(r => `<option value="${r}">${r}</option>`).join('');
            } else {
                // Rien de sélectionné
                document.getElementById('communeLibreSection').classList.add('hidden');
                document.getElementById('rueSelectSection').classList.add('hidden');
                document.getElementById('rueLibreSection').classList.add('hidden');
            }
        }

        function filterRues() {
            const commune = document.getElementById('communeSelect').value;
            if (!commune || commune === 'AUTRE') return;
            
            const searchText = document.getElementById('rueSearch').value.toUpperCase().trim();
            const mission = missionsData[currentMissionCode];
            const rues = mission.rues_par_commune[commune] || [];
            
            let filteredRues;
            if (searchText === '') {
                filteredRues = rues;
            } else {
                filteredRues = rues.filter(r => r.toUpperCase().startsWith(searchText));
            }
            
            if (filteredRues.length > 0) {
                document.getElementById('rueSelect').innerHTML = '<option value="">-- Sélectionner --</option>' + 
                    filteredRues.map(r => `<option value="${r}">${r}</option>`).join('');
            } else {
                document.getElementById('rueSelect').innerHTML = '<option value="">-- Aucune rue trouvée --</option>';
            }
        }

        function updateAddressList() {
            let html = '<h3>Adresses saisies :</h3>';
            currentAddresses.forEach((a, idx) => {
                const numeroComplet = a.suffixe ? `${a.numero} ${a.suffixe}` : a.numero;
                html += `<div class="address-item">${numeroComplet} ${a.rue} - ${a.commune} <strong>${a.resultat}</strong></div>`;
            });
            document.getElementById('addressList').innerHTML = html;
        }

        function addAddress() {
            let commune = document.getElementById('communeSelect').value;
            let rue = document.getElementById('rueSelect').value;
            
            // Gérer la saisie libre
            if (commune === 'AUTRE') {
                commune = document.getElementById('communeLibreInput').value.trim().toUpperCase();
                rue = document.getElementById('rueLibreInput').value.trim().toUpperCase();
            } else {
                rue = rue || document.getElementById('rueLibreInput').value.trim().toUpperCase();
            }
            
            const numero = document.getElementById('numeroInput').value;
            const foyers = document.getElementById('foyersInput').value;
            const resultat = document.getElementById('resultatSelect').value;

            if (!commune || !rue || !numero || !foyers || !resultat) {
                alert('❌ Remplissez tous les champs obligatoires');
                return;
            }

            let addr = {
                commune, rue, numero,
                suffixe: document.getElementById('sufixeInput').value,
                habitat: document.getElementById('habitatSelect').value,
                foyers: foyers,
                acces: document.getElementById('accesSelect').value,
                resultat: resultat,
                vu: document.getElementById('vuCheck').checked,
                typemalservi: document.getElementById('typemalservSelect').value || '',
                photo: document.getElementById('photoInput').files[0] || null,
                observations: document.getElementById('observationsInput').value || '',
                civilite: document.getElementById('civiliteSelect').value,
                nomPersonne: document.getElementById('nomPersonneInput').value,
                pasCommunication: document.getElementById('pasCommunicationCheck').checked
            };

            currentAddresses.push(addr);
            
            saveAddressesToStorage();
            sendToGoogleSheet(addr);
            updateAddressList();
            
            document.getElementById('numeroInput').value = '';
            document.getElementById('sufixeInput').value = '';
            document.getElementById('habitatSelect').value = '';
            document.getElementById('foyersInput').value = '';
            document.getElementById('accesSelect').value = '';
            document.getElementById('resultatSelect').value = '';
            document.getElementById('typemalservSelect').value = '';
            document.getElementById('photoInput').value = '';
            document.getElementById('observationsInput').value = '';
            document.getElementById('vuCheck').checked = false;
            document.getElementById('civiliteSelect').value = '';
            document.getElementById('nomPersonneInput').value = '';
            document.getElementById('pasCommunicationCheck').checked = false;
            document.getElementById('communeSelect').value = '';
            document.getElementById('communeLibreInput').value = '';
            document.getElementById('rueLibreInput').value = '';
            document.getElementById('malServiSection').classList.add('hidden');
            document.getElementById('photoPreview').style.display = 'none';
            updateStreets(); // Réinitialiser l'affichage
        }

        function finishMission() {
            const secteurs = prompt('Nombre de secteurs réalisés :');
            if (secteurs === null) return;
            
            if (currentAddresses.length === 0) {
                alert('❌ Aucune adresse saisie');
                return;
            }

            let reportHTML = `<p><strong>Mission:</strong> ${missionInfo.magasin}</p>
                <p><strong>Enquêtrice:</strong> ${missionInfo.prenom} ${missionInfo.nom}</p>
                <p><strong>Semaine:</strong> ${missionInfo.semaine}</p>
                <p><strong>Secteurs réalisés:</strong> ${secteurs}</p>
                <p><strong>Adresses saisies:</strong> ${currentAddresses.length}</p>
                <table>
                    <tr>
                        <th>Magasin</th>
                        <th>Numéro</th>
                        <th>Rue</th>
                        <th>Commune</th>
                        <th>Foyers</th>
                        <th>Accès</th>
                        <th>Vu</th>
                        <th>Civilité</th>
                        <th>Nom</th>
                        <th>Observations</th>
                        <th>Résultat</th>
                    </tr>`;
            
            currentAddresses.forEach(a => {
                const numeroComplet = a.suffixe ? `${a.numero} ${a.suffixe}` : a.numero;
                reportHTML += `<tr>
                    <td>${missionInfo.magasin}</td>
                    <td>${numeroComplet}</td>
                    <td>${a.rue}</td>
                    <td>${a.commune}</td>
                    <td>${a.foyers || ''}</td>
                    <td>${a.acces || ''}</td>
                    <td>${a.vu ? 'OUI' : 'NON'}</td>
                    <td>${a.civilite || ''}</td>
                    <td>${a.nomPersonne || ''}</td>
                    <td>${a.observations || ''}</td>
                    <td>${a.resultat}</td>
                </tr>`;
            });
            reportHTML += '</table>';
            
            document.getElementById('reportContent').innerHTML = reportHTML;
            showPage('endPage');
        }

        function resetMission() {
            clearSavedAddresses();
            currentAddresses = [];
            missionInfo = {};
            currentMissionCode = null;
            addressesSentCount = 0;
            showPage('authPage');
        }

        function generateExcelFile() {
            const data = [
                ['Magasin', 'Numéros', 'Adresses', 'Ville', 'Nombre de foyers', 'Accès', 'Vu', 'Civilité', 'Nom du résident', 'Observations', 'Réception document'],
                ...currentAddresses.map(a => [
                    missionInfo.magasin,
                    a.suffixe ? `${a.numero} ${a.suffixe}` : a.numero,
                    a.rue,
                    a.commune,
                    a.foyers || '',
                    a.acces || '',
                    a.vu ? 'OUI' : 'NON',
                    a.civilite || '',
                    a.pasCommunication ? 'Refus nom' : (a.nomPersonne || ''),
                    a.observations || '',
                    a.resultat === 'Bien servi' ? 'SERVI' : a.resultat === 'Non servi' ? 'NON SERVI' : 'MAL SERVI'
                ])
            ];
            
            const ws = XLSX.utils.aoa_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Feuil1');
            ws['!cols'] = [{wch:25},{wch:12},{wch:35},{wch:25},{wch:15},{wch:12},{wch:8},{wch:12},{wch:25},{wch:30},{wch:20}];
            
            return { wb: wb, fileName: `Rapport_${missionInfo.magasin}_s${missionInfo.semaine}.xlsx` };
        }

        function sendByEmail() {
            const { wb, fileName } = generateExcelFile();
            
            const subject = `Compte rendu ${missionInfo.client} - ${missionInfo.magasin} - Semaine ${missionInfo.semaine}`;
            const body = `Bonjour,\n\nVeuillez trouver en pièce jointe le compte rendu de la mission.\n\nCordialement,\n${missionInfo.prenom} ${missionInfo.nom}`;
            
            const mailtoLink = `mailto:${ADMIN_EMAIL}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
            
            // Télécharger d'abord le fichier
            XLSX.writeFile(wb, fileName);
            
            // Puis ouvrir le client email
            setTimeout(() => {
                window.location.href = mailtoLink;
                alert(`✅ Fichier téléchargé ! Joignez-le au mail qui va s'ouvrir.\n\nObjet pré-rempli: "${subject}"`);
            }, 500);
        }

        function shareReport() {
            const { wb, fileName } = generateExcelFile();
            XLSX.writeFile(wb, fileName);
            alert('✅ Fichier prêt à partager! Appuie et maintiens le fichier pour le partager par Email, WhatsApp, Google Drive, etc.');
        }

        function downloadReport() {
            const { wb, fileName } = generateExcelFile();
            XLSX.writeFile(wb, fileName);
        }

        // Charger les missions locales au démarrage
        window.addEventListener('load', function() {
            localMissions = JSON.parse(localStorage.getItem('localMissions')) || {};
            missionsData = { ...missionsData, ...localMissions };
            console.log('✅ TerraLog prêt avec', Object.keys(missionsData).length, 'missions');
        });
    </script>
</body>
</html>
