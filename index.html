        input[readonly] { background-color: #f0f0f0; cursor: not-allowed; }

        button:hover { background: #5568d3; }
        button.secondary { background: #764ba2; }
        button.secondary:hover { background: #6a3f94; }
        button.email { background: #2ecc71; }
        button.email:hover { background: #27ae60; }
        button.share { background: #3498db; }
        button.share:hover { background: #2980b9; }
        button.admin { background: #e74c3c; }

        .hidden { display: none !important; }
        .address-item { background: #f5f5f5; padding: 12px; border-radius: 5px; margin-bottom: 8px; border-left: 4px solid #667eea; font-size: 13px; }
        .mission-item { background: #f0f7ff; padding: 12px; border-radius: 5px; margin-bottom: 8px; border-left: 4px solid #667eea; display: flex; justify-content: space-between; align-items: center; }

        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }

            }
            document.getElementById('missionsList').innerHTML = html || '<p>Aucune mission</p>';

        function deleteMission(code) {
            if (confirm(`Supprimer la mission ${code} ?`)) {
                if (localMissions[code]) {
                    delete localMissions[code];
                    localStorage.setItem('localMissions', JSON.stringify(localMissions));
                }
                delete missionsData[code];
                displayMissions();
            }
        }

        function importExcel() {
            const file = document.getElementById('excelFile').files[0];
            if (!file) {
                alert('❌ Sélectionne un fichier');
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, {type: 'array'});
                    const sheetName = workbook.SheetNames[0];
                    const sheet = workbook.Sheets[sheetName];
                    const rows = XLSX.utils.sheet_to_json(sheet, {header: 1});

                    const code = prompt('Code mission (ex: 9999):');
                    if (!code) return;

                    const prenom = prompt('Prénom enquêteur:');
                    if (!prenom) return;

                    const nom = prompt('Nom enquêteur:');
                    if (!nom) return;

                    const client = prompt('Client:');
                    if (!client) return;

                    const magasin = prompt('Magasin:');
                    if (!magasin) return;

                    const semaine = prompt('Semaine:');
                    if (!semaine) return;

                    const communes = new Set();
                    const rues_par_commune = {};

                    for (let i = 1; i < rows.length; i++) {
                        const row = rows[i];
                        if (!row[2]) continue;
                        
                        const commune = row[2].toString().toUpperCase().trim();
                        const rue = row[3] ? row[3].toString().toUpperCase().trim() : '';

                        if (commune && rue) {
                            communes.add(commune);
                            if (!rues_par_commune[commune]) {
                                rues_par_commune[commune] = [];
                            }
                            if (!rues_par_commune[commune].includes(rue)) {
                                rues_par_commune[commune].push(rue);
                            }
                        }
                    }

                    const newMission = {
                        prenom,
                        nom,
                        client,
                        magasin,
                        semaine,
                        communes: Array.from(communes).sort(),
                        rues_par_commune: rues_par_commune
                    };

                    localMissions[code] = newMission;
                    localStorage.setItem('localMissions', JSON.stringify(localMissions));
                    
                    missionsData[code] = newMission;
                    
                    displayMissions();
                    document.getElementById('excelFile').value = '';
                    alert(`✅ Mission ${code} importée avec ${communes.size} commune(s)`);

                } catch (error) {
                    alert(`❌ Erreur lors de la lecture du fichier: ${error.message}`);
                }
            };
            reader.readAsArrayBuffer(file);
        }

                    </select>
                </div>
                
                <div id="malServiSection" class="hidden">
                    <div class="form-group">
                        <label>Type de mal servi :</label>
                        <select id="typemalservSelect">
                            <option value="">-- Sélectionner --</option>
                            <option value="Stop Pubs">Stop Pubs</option>
                            <option value="Dépôt">Dépôt</option>
                            <option value="Multi distribution">Multi distribution</option>
                            <option value="Dépassement excessif">Dépassement excessif</option>
                            <option value="Encartage">Encartage</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Photo (optionnel) :</label>
                        <input type="file" id="photoInput" accept="image/*" onchange="previewPhoto()">
                        <img id="photoPreview" class="photo-preview" style="display:none;">
                    </div>
                    <div class="form-group">
                        <label>Commentaires :</label>
                        <textarea id="commentairesInput" rows="3" placeholder="Commentaires..."></textarea>
                    </div>
                </div>
                
                <h2>Contact</h2>
                <div class="form-group">
                    <label>Civilité :</label>
                    <select id="civiliteSelect">
                        <option value="">-- Sélectionner --</option>
                        <option value="M.">M.</option>
                        <option value="Mme">Mme</option>
                        <option value="Mlle">Mlle</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Nom (optionnel) :</label>
                    <input type="text" id="nomPersonneInput" placeholder="Nom">
                </div>
                <div class="form-group">
                    <div class="checkbox-group">
                        <input type="checkbox" id="pasCommunicationCheck">
                        <label style="margin:0;">Pas de communication</label>
                    </div>
                </div>
                
                <button type="button" onclick="addAddress()">➕ Ajouter l'adresse</button>
                <button type="button" class="secondary" onclick="finishMission()">✅ Fin de journée</button>
                <div id="addressList"></div>`;
            
            document.getElementById('saisiePageContent').innerHTML = saisieHTML;
            showPage('saisiePageParent');
        }

        function toggleMalServi() {
            const resultat = document.getElementById('resultatSelect').value;
            const section = document.getElementById('malServiSection');
            if (resultat === 'Mal servi') {
                section.classList.remove('hidden');
            } else {
                section.classList.add('hidden');
            }
        }

        function previewPhoto() {
            const input = document.getElementById('photoInput');
            const preview = document.getElementById('photoPreview');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function updateStreets() {
            const commune = document.getElementById('communeSelect').value;
            const mission = missionsData[currentMissionCode];
            
            if (commune === 'AUTRE') {
                // Saisie libre commune
                document.getElementById('communeLibreSection').classList.remove('hidden');
                document.getElementById('rueSelectSection').classList.add('hidden');
                document.getElementById('rueLibreSection').classList.remove('hidden');
            } else if (commune) {
                // Commune trouvée
                document.getElementById('communeLibreSection').classList.add('hidden');
                document.getElementById('rueSelectSection').classList.remove('hidden');
                document.getElementById('rueLibreSection').classList.add('hidden');
                
                const rues = mission.rues_par_commune[commune] || [];
                document.getElementById('rueSelect').innerHTML = '<option value="">-- Sélectionner --</option>' + 
                    rues.map(r => `<option value="${r}">${r}</option>`).join('');
            } else {
                // Rien de sélectionné
                document.getElementById('communeLibreSection').classList.add('hidden');
                document.getElementById('rueSelectSection').classList.add('hidden');
                document.getElementById('rueLibreSection').classList.add('hidden');
            }
        }

        function addAddress() {
            let commune = document.getElementById('communeSelect').value;
            let rue = document.getElementById('rueSelect').value;
            
            // Gérer la saisie libre
            if (commune === 'AUTRE') {
                commune = document.getElementById('communeLibreInput').value.trim().toUpperCase();
                rue = document.getElementById('rueLibreInput').value.trim().toUpperCase();
            } else {
                rue = rue || document.getElementById('rueLibreInput').value.trim().toUpperCase();
            }
            
            const numero = document.getElementById('numeroInput').value;
            const foyers = document.getElementById('foyersInput').value;
            const resultat = document.getElementById('resultatSelect').value;

            if (!commune || !rue || !numero || !foyers || !resultat) {
                alert('❌ Remplissez tous les champs obligatoires');
                return;
            }

            let addr = {
                commune, rue, numero,
                suffixe: document.getElementById('sufixeInput').value,
                habitat: document.getElementById('habitatSelect').value,
                foyers: foyers,
                acces: document.getElementById('accesSelect').value,
                resultat: resultat,
                typemalservi: document.getElementById('typemalservSelect').value || '',
                photo: document.getElementById('photoInput').files[0] || null,
                commentaires: document.getElementById('commentairesInput').value || '',
                civilite: document.getElementById('civiliteSelect').value,
                nomPersonne: document.getElementById('nomPersonneInput').value,
                pasCommunication: document.getElementById('pasCommunicationCheck').checked
            };

            currentAddresses.push(addr);
            
            let html = '<h3>Adresses saisies :</h3>';
            currentAddresses.forEach((a, idx) => {
                const numeroComplet = a.suffixe ? `${a.numero} ${a.suffixe}` : a.numero;
                html += `<div class="address-item">${numeroComplet} ${a.rue} - ${a.commune} <strong>${a.resultat}</strong></div>`;
            });
            document.getElementById('addressList').innerHTML = html;
            
            document.getElementById('numeroInput').value = '';
            document.getElementById('sufixeInput').value = '';
            document.getElementById('habitatSelect').value = '';
            document.getElementById('foyersInput').value = '';
            document.getElementById('accesSelect').value = '';
            document.getElementById('resultatSelect').value = '';
            document.getElementById('typemalservSelect').value = '';
            document.getElementById('photoInput').value = '';
            document.getElementById('commentairesInput').value = '';
            document.getElementById('civiliteSelect').value = '';
            document.getElementById('nomPersonneInput').value = '';
            document.getElementById('pasCommunicationCheck').checked = false;
            document.getElementById('communeSelect').value = '';
            document.getElementById('communeLibreInput').value = '';
            document.getElementById('rueLibreInput').value = '';
            document.getElementById('malServiSection').classList.add('hidden');
            document.getElementById('photoPreview').style.display = 'none';
            updateStreets(); // Réinitialiser l'affichage
        }

        function finishMission() {
            const secteurs = prompt('Nombre de secteurs réalisés :');
            if (secteurs === null) return;
            
            if (currentAddresses.length === 0) {
                alert('❌ Aucune adresse saisie');
                return;
            }

            let reportHTML = `<p><strong>Mission:</strong> ${missionInfo.magasin}</p>
                <p><strong>Enquêtrice:</strong> ${missionInfo.prenom} ${missionInfo.nom}</p>
                <p><strong>Semaine:</strong> ${missionInfo.semaine}</p>
                <p><strong>Secteurs réalisés:</strong> ${secteurs}</p>
                <p><strong>Adresses saisies:</strong> ${currentAddresses.length}</p>
                <table>
                    <tr>
                        <th>Magasin</th>
                        <th>Numéro</th>
                        <th>Rue</th>
                        <th>Commune</th>
                        <th>Foyers</th>
                        <th>Civilité</th>
                        <th>Nom</th>
                        <th>Résultat</th>
                    </tr>`;
            
            currentAddresses.forEach(a => {
                const numeroComplet = a.suffixe ? `${a.numero} ${a.suffixe}` : a.numero;
                reportHTML += `<tr>
                    <td>${missionInfo.magasin}</td>
                    <td>${numeroComplet}</td>
                    <td>${a.rue}</td>
                    <td>${a.commune}</td>
                    <td>${a.foyers || ''}</td>
                    <td>${a.civilite || ''}</td>
                    <td>${a.nomPersonne || ''}</td>
                    <td>${a.resultat}</td>
                </tr>`;
            });
            reportHTML += '</table>';
            
            document.getElementById('reportContent').innerHTML = reportHTML;
            showPage('endPage');
        }

        function generateExcelFile() {
            const data = [
                ['Magasin', 'Numéros', 'Adresses', 'Ville', 'Nombre de foyers', 'Accès', 'Civilité', 'Nom du résident', 'Réception document'],
                ...currentAddresses.map(a => [
                    missionInfo.magasin,
                    a.suffixe ? `${a.numero} ${a.suffixe}` : a.numero,
                    a.rue,
                    a.commune,
                    a.foyers || '',
                    a.acces || '',
                    a.civilite || '',
                    a.pasCommunication ? 'Refus nom' : (a.nomPersonne || ''),
                    a.resultat === 'Bien servi' ? 'SERVI' : a.resultat === 'Non servi' ? 'NON SERVI' : 'MAL SERVI'
                ])
            ];
            
            const ws = XLSX.utils.aoa_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Feuil1');
            ws['!cols'] = [{wch:25},{wch:12},{wch:35},{wch:25},{wch:15},{wch:12},{wch:12},{wch:25},{wch:20}];
            
            return { wb: wb, fileName: `Rapport_${missionInfo.magasin}_s${missionInfo.semaine}.xlsx` };
        }

        function sendByEmail() {
            const { wb, fileName } = generateExcelFile();
            
            const subject = `Compte rendu ${missionInfo.client} - ${missionInfo.magasin} - Semaine ${missionInfo.semaine}`;
            const body = `Bonjour,\n\nVeuillez trouver en pièce jointe le compte rendu de la mission.\n\nCordialement,\n${missionInfo.prenom} ${missionInfo.nom}`;
            
            const mailtoLink = `mailto:${ADMIN_EMAIL}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
            
            // Télécharger d'abord le fichier
            XLSX.writeFile(wb, fileName);
            
            // Puis ouvrir le client email
            setTimeout(() => {
                window.location.href = mailtoLink;
                alert(`✅ Fichier téléchargé ! Joignez-le au mail qui va s'ouvrir.\n\nObjet pré-rempli: "${subject}"`);
            }, 500);
        }

        function shareReport() {
            const { wb, fileName } = generateExcelFile();
            XLSX.writeFile(wb, fileName);
            alert('✅ Fichier prêt à partager! Appuie et maintiens le fichier pour le partager par Email, WhatsApp, Google Drive, etc.');
        }

        function downloadReport() {
            const { wb, fileName } = generateExcelFile();
            XLSX.writeFile(wb, fileName);
        }

        // Charger les missions locales au démarrage
        window.addEventListener('load', function() {
            localMissions = JSON.parse(localStorage.getItem('localMissions')) || {};
            missionsData = { ...missionsData, ...localMissions };
            console.log('✅ TerraLog prêt avec', Object.keys(missionsData).length, 'missions');
        });
    </script>
</body>
</html>
